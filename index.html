<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Event Dashboard</title>

  <style>
    body {
     margin: 0;
     font-family: Arial;
     background: linear-gradient(120deg, #8ec5fc, #e0c3fc);
    }

    .app {
     max-width: 1000px;
     margin: auto;
     padding: 20px;
    }

    h1 {
     text-align: center;
     color: white;
    }

    .grid {
     display: grid;
     grid-template-columns: 1fr 2fr;
     gap: 20px;
    }
  </style>
</head>
<body>

  <div class="app">
    <h1>Smart Event Dashboard</h1>

    <div class="grid">
      <div class="card form-card">
        <h3>Add New Event</h3>

        <form id="eventForm">
          <label>Event Title</label>
          <input id="title" required>

          <label>Event Date</label>
          <input type="date" id="date" required>

          <label>Category</label>
          <select id="category">
            <option>Conference</option>
            <option>Workshop</option>
            <option>Seminar</option>
          </select>

          <label>Description</label>
          <textarea id="desc"></textarea>

          <button type="submit">Add Event</button>
        </form>
      </div>
      <div class="card events-card">
        <div class="events-header">
          <h3>My Events</h3>
          <div>
            <button id="clear">Clear All Events</button>
            <button id="sample">Add Sample Events</button>
          </div>
        </div>

        <div id="events" class="events">
          <p class="empty">No events yet. Add your first event!</p>
        </div>
      </div>
    </div>

  </div>

</body>
</ht
